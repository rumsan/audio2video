<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Audio2Video – Convert Audio to YouTube &amp; Facebook Video Instantly</title>
    <meta name="description" content="The easiest way to convert a podcast, lecture, or music file into a shareable video for YouTube, Facebook, TikTok, and more. Add timed image slides, chapter markers, and export MP4 in minutes." />
    <meta name="keywords" content="audio to video, convert audio to video, audio to youtube video, podcast to video, mp3 to mp4, audio visualizer, chapter markers, timed slides, video converter" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Rumsan" />
    <link rel="canonical" href="https://audio2video.uk/" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Audio2Video" />
    <meta property="og:title" content="Audio2Video – Convert Audio to YouTube &amp; Facebook Video" />
    <meta property="og:description" content="Turn your podcast, lecture, or music into a shareable video with timed slides and chapter markers. Ready for YouTube, Facebook, TikTok, and more." />
    <meta property="og:url" content="https://audio2video.uk/" />
    <meta property="og:image" content="https://audio2video.uk/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Audio2Video – Convert Audio to YouTube &amp; Facebook Video" />
    <meta name="twitter:description" content="Turn your podcast, lecture, or music into a shareable video with timed slides and chapter markers. Ready for YouTube, Facebook, TikTok, and more." />
    <meta name="twitter:image" content="https://audio2video.uk/og-image.png" />
    <meta name="twitter:site" content="@rumsan" />

    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Audio2Video",
      "url": "https://audio2video.uk/",
      "description": "Convert audio files to shareable videos for YouTube, Facebook, and social media with timed image slides, chapter markers, and real-time progress tracking.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Convert audio to MP4, MKV, or WebM video",
        "Timed image slides with chapter markers",
        "Real-time conversion progress via Server-Sent Events",
        "In-browser waveform preview",
        "Output ready for YouTube, Facebook, TikTok"
      ],
      "creator": {
        "@type": "Organization",
        "name": "Rumsan",
        "url": "https://rumsan.com",
        "description": "Impact innovation company using ethical technology to solve real-world problems."
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What audio formats can I convert to video?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Audio2Video supports MP3, M4A, AAC, WAV, OGG, FLAC, OPUS, and most formats FFmpeg can decode."
          }
        },
        {
          "@type": "Question",
          "name": "Can I upload the video to YouTube?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Audio2Video exports MP4 (H.264) videos at 1920x1080 — the format recommended by YouTube, Facebook, TikTok, and Instagram Reels."
          }
        },
        {
          "@type": "Question",
          "name": "How do I add timed slides to my audio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In the Studio step, add image slides and set a timestamp (HH:MM:SS) for when each image appears. Each slide title becomes a chapter marker in the final video."
          }
        },
        {
          "@type": "Question",
          "name": "Is Audio2Video free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Audio2Video is a free, open-source tool built by Rumsan."
          }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
